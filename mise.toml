# mise.toml
[tools]
node = "25"
yarn = "4.13.0"

# ────────────────────────────────────────
# Environment (activated repo-wide)
# ────────────────────────────────────────

[env]
#
# ────────────────────────────────────────
# Tasks (run from anywhere — mise uses root config)
# ────────────────────────────────────────

[tasks]
setup = { run = "yarn install", description = "Install dependencies" }

start = { run = "yarn start", description = "Start UI" }

test = { run = "yarn test:run", description = "Run tests" }

test-coverage = { run = "yarn test:coverage", description = "Run tests with coverage report" }

build = { run = "yarn build", description = "Build UI" }

docker-build = { run = "docker build --no-cache -t gryphus-lab/react-admin-app -f Dockerfile .", description = "Docker build" }

compose-up = { run = "docker compose up -d", description = "Docker compose up" }
compose-down = { run = "docker compose down", description = "Docker compose down - all services" }
compose-down-full = { run = "docker compose down -v", description = "Docker compose down - all services and volumes" }

check = { run = [
  "yarn lint",
  "yarn prettier:check",
], description = "Check using yarn lint/prettier" }
format = { run = [
  "yarn lint:fix",
  "yarn prettier",
], description = "Format using yarn lint/prettier" }

